# Render Blueprint
# https://render.com/docs/blueprint-spec
#
# Deploy this repo to Render in one click:
#   1. Push this file to GitHub
#   2. In Render dashboard: New → Blueprint → connect this repo
#   3. Render auto-detects this file and creates the service
#
# Notes
# -----
# • Free-tier instances sleep after 15 min of inactivity. Use UptimeRobot
#   (free) to ping https://iyf-sylhet.onrender.com every 5 minutes and
#   keep the instance warm. Cold-start latency is ~30s.
# • The only secrets you MUST fill in manually in the Render dashboard
#   (Environment tab) after the first deploy are ADMIN_PASSWORD and
#   RESEND_API_KEY. SESSION_SECRET is auto-generated by Render.
# • REDIS_URL is optional — the app degrades to an in-memory rate-limit
#   store if unset. Provide an Upstash rediss:// URL when you're ready.
# • NODE_ENV=production is auto-injected by Render at runtime, but we set
#   it explicitly so it's also visible at build time.

services:
  - type: web
    name: iyf-sylhet
    runtime: node
    plan: free
    region: singapore
    branch: main
    autoDeploy: true
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /

    envVars:
      # ---- Runtime hint (Render auto-detects Node 20.x from engines.node) ----
      - key: NODE_ENV
        value: production

      # ---- Secrets you must set manually in the Render dashboard ----
      # ADMIN_PASSWORD: the password for /admin login.
      - key: ADMIN_PASSWORD
        sync: false

      # RESEND_API_KEY: from https://resend.com → API Keys (re_***).
      # Required for the contact + volunteer forms to actually send email.
      - key: RESEND_API_KEY
        sync: false

      # SESSION_SECRET: HMAC key for signing session cookies.
      # generateValue: true makes Render create a strong random value
      # automatically — no prompt, no manual step.
      - key: SESSION_SECRET
        generateValue: true

      # ---- Optional / have safe defaults ----
      # MAIL_FROM must use a domain verified in Resend. The default below
      # uses Resend's onboarding sandbox domain, which works for testing
      # but only delivers to the Resend account owner. Override later.
      - key: MAIL_FROM
        value: ISKCON Youth Forum <onboarding@resend.dev>

      # ADMIN_EMAIL: where admin notifications are delivered. Leave empty
      # if you don't want admin copies yet — submissions still save to Redis.
      - key: ADMIN_EMAIL
        value: ""

      # REDIS_URL: rediss://user:pass@host:port (TLS). Free Upstash works.
      # Empty = app uses an in-memory rate-limit fallback.
      - key: REDIS_URL
        value: ""

      # ---- Public site (safe to ship to the browser) ----
      - key: PUBLIC_SITE_NAME
        value: ISKCON Youth Forum, Sylhet
      # PUBLIC_SITE_URL: Render sets RENDER_EXTERNAL_URL automatically
      # once the service has a hostname. Override here for a custom domain.
      - key: PUBLIC_SITE_URL
        value: ""

      # ---- Optional tunables (defaults shown) ----
      - key: SESSION_COOKIE_NAME
        value: iyf_session
      - key: SESSION_TTL_SECONDS
        value: "43200"            # 12 hours
      - key: SUBMISSION_TTL_SECONDS
        value: "7776000"          # 90 days